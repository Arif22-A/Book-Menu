<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ocean Menu - Signature</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Playfair Display', serif;
  background: #0a0a0a;
}

/* PAGE A4 */
.page {
  width: 210mm;
  height: 297mm;
  margin: auto;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FRAME */
.frame {
  width: 188mm;
  height: 277mm;
  border: 1.5px solid #d4af37;
  position: relative;
  padding: 20mm 12mm;

  display: flex;
  flex-direction: column;
}

/* INNER BORDER */
.frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212,175,55,0.5);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 10mm;
}

.header img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid #d4af37;
}

.restaurant-name {
  font-size: 14px;
  letter-spacing: 3px;
  color: #d4af37;
  margin-top: 5px;
}

/* MENU GRID BASE */
.menu {
  flex: 1;
  display: grid;
  gap: 18px;
}

/* === AUTO LAYOUT === */

/* 4 ITEM */
.menu-4 {
  grid-template-columns: repeat(2, 1fr);
  align-content: center;
}

/* 6 ITEM */
.menu-6 {
  grid-template-columns: repeat(2, 1fr);
  align-content: space-between;
}

/* 8 ITEM */
.menu-8 {
  grid-template-columns: repeat(2, 1fr);
  align-content: space-between;
}

/* ITEM */
.item {
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* IMAGE BASE */
.item img {
  width: 100%;
  object-fit: cover;
  border-radius: 6px;
}

/* TEXT */
.title {
  margin-top: 6px;
  color: #eaeaea;
}

.price {
  color: #d4af37;
}

/* === SIZE SYSTEM === */

/* 4 ITEM (BESAR) */
.menu-4 .item img { height: 140px; }
.menu-4 .title { font-size: 16px; }
.menu-4 .price { font-size: 14px; }

/* 6 ITEM (MEDIUM) */
.menu-6 .item img { height: 110px; }
.menu-6 .title { font-size: 14px; }
.menu-6 .price { font-size: 13px; }

/* 8 ITEM (KECIL) */
.menu-8 .item img { height: 90px; }
.menu-8 .title { font-size: 13px; }
.menu-8 .price { font-size: 12px; }

/* FOOTER */
.footer {
  margin-top: 10mm;
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: #d4af37;
}

/* PRINT FIX */
@media print {

  body {
    margin: 0;
  }

  .page {
    width: 210mm;
    height: 297mm;
  }

  .frame {
    margin: auto;
    page-break-after: avoid;
  }

}
  
.frame {
  width: 180mm;   /* sebelumnya 188 */
  height: 267mm;  /* sebelumnya 277 */
}
.menu {
  margin: 10mm 0;
}
.menu-4 {
  align-content: center;
}

.menu-6 {
  align-content: space-between;
}

.menu-8 {
  align-content: space-between;
}
</style>
</head>

<body>

<div class="page">
  <div class="frame">

    <!-- HEADER -->
    <div class="header">
      <img src="logo.png">
      <div class="restaurant-name">OCEAN</div>
    </div>

    <!-- MENU (GANTI CLASS SESUAI JUMLAH) -->
    <div class="menu menu-4">

      <div class="item">
        <img src="signature.jpg">
        <div class="title">Ocean Latte</div>
        <div class="price">IDR 32K</div>
      </div>

      <div class="item">
        <img src="signature.jpg">
        <div class="title">Caramel Coffee</div>
        <div class="price">IDR 30K</div>
      </div>

      <div class="item">
        <img src="signature.jpg">
        <div class="title">Matcha Latte</div>
        <div class="price">IDR 28K</div>
      </div>

      <div class="item">
        <img src="signature.jpg">
        <div class="title">Chocolate Blend</div>
        <div class="price">IDR 29K</div>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div>@ocean.srg</div>
      <div>ocean.srg</div>
      <div>ocean.srg</div>
    </div>

  </div>
</div>
<script>
function applyMenuLayout() {
  const menu = document.querySelector('.menu');
  if (!menu) return;

  const items = menu.querySelectorAll('.item').length;

  menu.classList.remove('menu-4', 'menu-6', 'menu-8');

  if (items <= 4) {
    menu.classList.add('menu-4');
  } else if (items <= 6) {
    menu.classList.add('menu-6');
  } else {
    menu.classList.add('menu-8');
  }

  // 🔥 TAMBAHAN: kasih marker buat debug print
  menu.setAttribute('data-count', items);
}

window.addEventListener('DOMContentLoaded', applyMenuLayout);
</script>
</body>
</html>
