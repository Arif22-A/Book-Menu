<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ocean Menu - Signature</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Playfair Display', serif;
  background: radial-gradient(circle, #111 0%, #000 100%);
}

/* PAGE A4 */
.page {
  width: 100vw;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  overflow: hidden; /* 🔥 NO SCROLL */
}

/* FRAME */
.frame {
  width: min(90vw, 420px);
  aspect-ratio: 210 / 297;

  border: 1.5px solid #d4af37;
  padding: 20px 12px;

  display: flex;
  flex-direction: column;
}

/* INNER BORDER */
.frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212,175,55,0.5);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid #d4af37;
}

.restaurant-name {
  font-size: 16px;
  letter-spacing: 4px;
  color: #d4af37;
  margin-top: 6px;
}

.tagline {
  font-size: 10px;
  color: #aaa;
  letter-spacing: 2px;
  margin-top: 4px;
}

.divider {
  width: 60%;
  height: 1px;
  background: rgba(212,175,55,0.4);
  margin: 8px auto;
}

.info {
  font-size: 10px;
  color: #aaa;
  line-height: 1.6;
}

/* MENU GRID BASE */
.menu {
  flex: 1;
  min-height: 0;

  display: grid;
  gap: 12px; /* 🔥 JANGAN BESAR */
}

/* === AUTO LAYOUT === */

/* 4 ITEM */
.menu-4 {
  grid-template-columns: repeat(2, 1fr);
  align-content: center;
}

/* 6 ITEM */
.menu-6 {
  grid-template-columns: repeat(2, 1fr);
  align-content: space-between;
}

/* 8 ITEM */
.menu-8 {
  grid-template-columns: repeat(2, 1fr);
  align-content: space-between;
}

/* ITEM */
.item {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  overflow: hidden;
}

/* IMAGE BASE */
.item img {
  width: 100%;
  object-fit: cover;
  border-radius: 6px;
}

/* TEXT */
.title {
  margin-top: 6px;
  color: #eaeaea;
}

.price {
  color: #d4af37;
}

/* === SIZE SYSTEM === */

/* 4 ITEM (BESAR) */
.menu-4 .item img { height: 140px; }
.menu-4 .title { font-size: 16px; }
.menu-4 .price { font-size: 14px; }

/* 6 ITEM (MEDIUM) */
.menu-6 .item img { height: 110px; }
.menu-6 .title { font-size: 14px; }
.menu-6 .price { font-size: 13px; }

/* 8 ITEM (KECIL) */
.menu-8 .item img { height: 90px; }
.menu-8 .title { font-size: 13px; }
.menu-8 .price { font-size: 12px; }

.menu-4 {
  grid-template-rows: repeat(2, 1fr); /* 🔥 ini penting */
}

.menu-6 {
  grid-template-rows: repeat(3, 1fr);
}

.menu-8 {
  grid-template-rows: repeat(4, 1fr);
}

/* FOOTER */
.footer {
  margin-top: 20px;
}

.social-inline {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: #d4af37;
}

.social-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
@media print {

  body {
    margin: 0;
  }

  .page {
    width: 210mm;
    height: 297mm;
    overflow: visible;
  }

  .frame {
    width: 180mm;
    height: 267mm;
  }

} 
@media print {
  .menu {
    margin: 10mm 0;
  }
}

</style>
</head>

<body>

<div class="page">
  <div class="frame">

    <!-- HEADER -->
    <div class="header">
      <img src="logo.png">
      <div class="restaurant-name">OCEAN</div>
    </div>

    <!-- MENU (GANTI CLASS SESUAI JUMLAH) -->
    <div class="menu menu-4">

      <div class="item">
        <img src="signature.jpg">
        <div class="title">Ocean Latte</div>
        <div class="price">IDR 32K</div>
      </div>

      <div class="item">
        <img src="signature.jpg">
        <div class="title">Caramel Coffee</div>
        <div class="price">IDR 30K</div>
      </div>

      <div class="item">
        <img src="signature.jpg">
        <div class="title">Matcha Latte</div>
        <div class="price">IDR 28K</div>
      </div>

      <div class="item">
        <img src="signature.jpg">
        <div class="title">Chocolate Blend</div>
        <div class="price">IDR 29K</div>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div>@ocean.srg</div>
      <div>ocean.srg</div>
      <div>ocean.srg</div>
    </div>

  </div>
</div>
<script>
function applyMenuLayout() {
  const menu = document.querySelector('.menu');
  if (!menu) return;

  const items = menu.querySelectorAll('.item').length;

  menu.classList.remove('menu-4', 'menu-6', 'menu-8');

  if (items <= 4) {
    menu.classList.add('menu-4');
  } else if (items <= 6) {
    menu.classList.add('menu-6');
  } else {
    menu.classList.add('menu-8');
  }

  // 🔥 TAMBAHAN: kasih marker buat debug print
  menu.setAttribute('data-count', items);
}

window.addEventListener('DOMContentLoaded', applyMenuLayout);
</script>
</body>
</html>
