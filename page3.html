<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Menu - Signature</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Playfair Display', serif;
}

/* BACKGROUND */
.bg-black {
  position: absolute;
  inset: 0;
  background: #0a0a0a;
  z-index: 0;
}
.page {
  position: relative;
  width: 100%;
  min-height: 100vh;
  padding: 20px 0;

  display: flex;
  justify-content: center;
  align-items: center;
}
.menu-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

@media print {
  html, body {
    width: 210mm;
    height: 297mm;
  }

  .page {
    width: 210mm;
    height: 297mm;
    display: block;
    padding: 0;
  }

  .page-frame {
    width: 190mm;
    height: 277mm;
  }
}
/* FRAME */
.page-frame {
  position: relative;
  z-index: 1;
  width: 94%; /* 🔥 lebih lebar */
  max-width: 500px; /* 🔥 lebih besar */

  aspect-ratio: 210 / 297;

  border: 1.5px solid #d4af37;
  display: flex;
  justify-content: center;
  align-items: center;
}

.page-frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212,175,55,0.5);
}

/* LABEL */
.label {
  font-size: 10px;
  letter-spacing: 3px;
  color: #d4af37;
  margin-bottom: 10px;
}

/* DESC */
.desc {
  font-size: 12px;
  color: #aaa;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* PRICE */
.price {
  font-size: 14px;
  color: #d4af37;
  letter-spacing: 1px;
}

/* PRINT */
@page {
  size: A4;
  margin: 0;
}

/* HEADER */
.restaurant-name {
  font-size: 14px;
  letter-spacing: 3px;
  color: #d4af37;
  margin-top: 5px;
}

/* MENU WRAPPER */
.menu-wrapper {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* MENU BLOCK */
.menu-block {
  text-align: center;
}

/* IMAGE SIZE FIX (INI YANG LO BUTUH) */
.signature-img img {
  height: 120px; /* 🔥 DIPENDEKIN */
}

/* TEXT SCALE */
.title {
  font-size: 16px;
  margin-bottom: 8px;
}

.desc {
  font-size: 11px;
  color: #aaa;
  line-height: 1.5;
  margin-bottom: 12px;
}

.price {
  font-size: 12px;
  color: #d4af37;
}

/* GRID */
.menu-grid {
  display: grid; /* 🔥 WAJIB ADA */
  grid-template-columns: repeat(2, 1fr); /* 2 kolom kanan kiri */
  gap: 12px;
  margin: 10px 0;
}

/* ITEM */
.menu-item {
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* IMAGE */
.menu-item img {
  width: 100%;
  height: 70px; /* 🔥 kecil tapi proporsional */
  object-fit: cover;
  border-radius: 4px;

  /* biar nyatu */
  filter: brightness(0.85);
}

/* TITLE */
.menu-item .title {
  font-size: 13px;
  margin-top: 6px;
}

/* PRICE */
.menu-item .price {
  font-size: 11px;
  color: #d4af37;
}
.header {
  text-align: center;
}

.header img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid #d4af37;
}
  
.footer {
  margin-top: auto; /* 🔥 ini kunci */
  font-size: 10px;
  color: #d4af37;
  display: flex;
  justify-content: space-between;
}
  
.page-content {
  width: 75%;
  height: 100%; /* 🔥 penting: isi penuh frame */
  padding: 15px 0;

  display: flex;
  flex-direction: column;
  justify-content: flex-start; /* 🔥 jangan space-between */

  text-align: center;
  color: #eaeaea;
}
  @media print {

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  html, body {
    width: 210mm;
    height: 297mm;
    overflow: hidden; /* 🔥 penting */
  }

  .page {
    width: 210mm;
    height: 297mm;
    margin: 0;
    padding: 0;
  }

  .page-frame {
    width: 190mm;
    height: 277mm;
    margin: auto;
    position: relative;
    transform: none; /* 🔥 matiin translate */
  }

  .page-content {
    height: 100%;
    padding: 10mm 0; /* 🔥 biar aman gak kepotong */
  }

  .menu-item img {
    height: 80px; /* 🔥 kecilin dikit biar muat */
  }

  .title {
    font-size: 12px;
  }

  .price {
    font-size: 11px;
  }

  .page,
  .page-frame,
  .page-content {
    page-break-after: avoid;
    page-break-inside: avoid;
  }
}
.footer {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="page">

  <div class="bg-black"></div>

  <div class="page-frame">

    <div class="page-content">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <img src="logo.png">
    </div>
    <div class="restaurant-name">OCEAN</div>
  </div>

 <div class="menu-grid">

  <div class="menu-item">
    <img src="signature.jpg">
    <div class="title">Ocean Latte</div>
    <div class="price">IDR 32K</div>
  </div>

  <div class="menu-item">
    <img src="signature.jpg">
    <div class="title">Caramel Coffee</div>
    <div class="price">IDR 30K</div>
  </div>

  <div class="menu-item">
    <img src="signature.jpg">
    <div class="title">Matcha Latte</div>
    <div class="price">IDR 28K</div>
  </div>

  <div class="menu-item">
    <img src="signature.jpg">
    <div class="title">Chocolate Blend</div>
    <div class="price">IDR 29K</div>
  </div>

</div>

  <!-- FOOTER -->
  <div class="footer">
    <div>@ocean.srg</div>
    <div>ocean.srg</div>
    <div>ocean.srg</div>
  </div>

</div>
  </div>

</div>
</div>
<div class="nav-arrow prev">
  <a href="page2.html">
    <i class="fas fa-arrow-left"></i>
  </a>
</div>
</body>
</html>
