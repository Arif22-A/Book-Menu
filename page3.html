<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ocean Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Playfair Display', serif;
  background: #0a0a0a;
}

/* PAGE */
.page {
  width: 100%;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: flex-start;

  padding: 20px 0;
}
/* FRAME */
.frame {
  width: min(94vw, 480px);
  min-height: 90vh;

  border: 1.5px solid #d4af37;
  padding: 20px;
  background: #0a0a0a;

  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  flex-shrink: 0;
  text-align: center;
  margin-bottom: 14px;
}

.logo {
  width: 52px;
  height: 52px;
  margin: 0 auto;
  border-radius: 50%;
  border: 1.5px solid #d4af37;
  overflow: hidden;
  background: #111;
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.restaurant-name {
  color: #d4af37;
  letter-spacing: 3px;
  font-size: 16px;
  margin-top: 8px;
}

.tagline {
  color: #aaa;
  font-size: 10px;
  margin-top: 4px;
}

.divider {
  height: 1px;
  background: rgba(212,175,55,0.4);
  width: 60%;
  margin: 10px auto;
}

.info {
  color: #ccc;
  font-size: 10px;
  line-height: 1.5;
}

/* MENU GRID */
.menu {
  flex: 1;

  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;

  gap: 20px;

  align-content: space-between; /* 🔥 penting */
  justify-content: stretch;
}
/* ITEM */
.item {
  display: flex;
  flex-direction: column;
  justify-content: center; /* 🔥 center vertikal */
  align-items: center;
  text-align: center;
}

/* FIXED IMAGE BOX */
.image-box {
  width: 100%;
  height: 95px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: transparent;
  border: none;
  overflow: visible;
}

.image-box img {
  max-width: 100%;
  max-height: 100%;

  width: auto;
  height: auto;

  object-fit: contain;
  display: block;

  /* premium subtle effect */
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
}

/* TEXT */
.title {
  color: #fff;
  font-size: 12px;
  margin-top: 4px;
}

.desc {
  color: #aaa;
  font-size: 9px;
  line-height: 1.35;
  margin-top: 2px;
}

.price {
  color: #d4af37;
  font-size: 10px;
  margin-top: 3px;
}

/* FOOTER */
.footer {
  flex-shrink: 0;
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid rgba(212,175,55,0.2);
  text-align: center;
}

.social {
  display: inline-flex;
  gap: 18px;
  flex-wrap: wrap;
  justify-content: center;
  color: #bbb;
  font-size: 10px;
}

.social div {
  display: flex;
  align-items: center;
  gap: 5px;
}

/* PRINT */
@media print {

  @page {
    size: A4;
    margin: 0;
  }

  html, body {
    width: 210mm;
    height: 297mm;
    margin: 0;
    padding: 0;
    background: white;
  }

  body {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .page {
    width: 210mm;
    height: 297mm;
    margin: 0;
    padding: 0;
    display: block;
  }

  .frame {
    width: 210mm;
    height: 297mm;

    padding: 14mm;
    margin: 0;
    border: 2px solid #d4af37 !important;
    background: #0a0a0a !important;

    box-sizing: border-box;
  }

  .menu {
    height: 100%;
    gap: 24px;
    align-content: space-between;
  }

  .image-box {
    height: 95px;
  }

  .title {
    font-size: 14px;
  }

  .desc {
    font-size: 10px;
  }

  .price {
    font-size: 11px;
  }
}
  
/* NAVIGATION ARROWS */
.nav-arrow {
  position: fixed;
  bottom: 20px;
  z-index: 999;
}

.nav-arrow a {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: 1px solid #d4af37;
  border-radius: 50%;
  color: #d4af37;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

/* HOVER */
.nav-arrow a:hover {
  background: #d4af37;
  color: #000;
}

/* POSISI */
.nav-arrow.next {
  right: 20px;
}

.nav-arrow.prev {
  left: 20px;
}

.actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
}

.actions button {
  padding: 12px 20px;
  border: 1px solid #d4af37;
  background: #111;
  color: #d4af37;
  cursor: pointer;
  font-family: inherit;
  border-radius: 8px;
  font-size: 14px;
}

.actions button:hover {
  background: #d4af37;
  color: #000;
}
</style>
</head>
<body>

<div class="page">
  <div class="frame">

    <div class="header">
      <div class="logo">
        <img src="logo.png">
      </div>

      <div class="restaurant-name">OCEAN</div>
      <div class="tagline">Kitchen & Lounge • EST. 2023</div>

      <div class="divider"></div>

      <div class="info">
        Jl. Ahmad Yani No.34 Sragen<br>
        0857-4102-2111 • 0857-1246-9835
      </div>
    </div>

    <div class="menu">

      <div class="item">
        <div class="image-box">
          <img src="hero.png">
        </div>
        <div class="title">Ocean Latte</div>
        <div class="desc">Signature drink</div>
        <div class="price">IDR 32K</div>
      </div>

      <div class="item">
        <div class="image-box">
          <img src="signature.jpg">
        </div>
        <div class="title">Grilled Salmon</div>
        <div class="desc">Fresh ocean fish</div>
        <div class="price">IDR 65K</div>
      </div>

      <div class="item">
        <div class="image-box">
          <img src="nila-goreng.png">
        </div>
        <div class="title">Beef Steak</div>
        <div class="desc">Premium beef</div>
        <div class="price">IDR 75K</div>
      </div>

      <div class="item">
        <div class="image-box">
          <img src="cookies-cream.png">
        </div>
        <div class="title">Matcha Latte</div>
        <div class="desc">Japanese matcha</div>
        <div class="price">IDR 28K</div>
      </div>

    </div>

    <div class="footer">
      <div class="social">
        <div><i class="fab fa-instagram"></i> @ocean.srg</div>
        <div><i class="fab fa-facebook-f"></i> ocean.srg</div>
        <div><i class="fab fa-tiktok"></i> ocean.srg</div>
      </div>
    </div>

  </div>
</div>
</div>
  
  
<div class="actions">
  <button onclick="window.print()">Export PDF</button>
  <button onclick="downloadPNG()">Download PNG</button>
</div>
  
<div class="nav-arrow prev">
  <a href="page2.html">
    <i class="fas fa-arrow-left"></i>
  </a>
</div>

<div class="nav-arrow next">
  <a href="page4.html">
    <i class="fas fa-arrow-right"></i>
  </a>
</div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
async function downloadPNG() {
  const target = document.querySelector(".frame");

  const canvas = await html2canvas(target, {
    scale: 5, // 🔥 ULTRA HD
    useCORS: true,
    backgroundColor: "#0a0a0a",
    logging: false
  });

  const link = document.createElement("a");
  link.download = "ocean-menu-ultra-hd.png";
  link.href = canvas.toDataURL("image/png", 1.0);
  link.click();
}
</script>
</body>
</html>
