<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ocean Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Playfair Display', serif;
  background: #0a0a0a;
}

/* PAGE */
.page {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FRAME */
.frame {
  width: min(92vw, 420px);
  aspect-ratio: 210 / 297;

  border: 1.5px solid #d4af37;
  padding: 20px;
  background: #0a0a0a;

  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  flex-shrink: 0;
  text-align: center;
  margin-bottom: 14px;
}

.logo {
  width: 52px;
  height: 52px;
  margin: 0 auto;
  border-radius: 50%;
  border: 1.5px solid #d4af37;
  overflow: hidden;
  background: #111;
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.restaurant-name {
  color: #d4af37;
  letter-spacing: 3px;
  font-size: 16px;
  margin-top: 8px;
}

.tagline {
  color: #aaa;
  font-size: 10px;
  margin-top: 4px;
}

.divider {
  height: 1px;
  background: rgba(212,175,55,0.4);
  width: 60%;
  margin: 10px auto;
}

.info {
  color: #ccc;
  font-size: 10px;
  line-height: 1.5;
}

/* MENU GRID */
.menu {
  flex: 1;
  min-height: 0;

  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-auto-rows: 1fr;   /* 🔥 semua card tinggi sama */

  gap: 12px;
  overflow: hidden;      /* 🔥 cegah dorong footer */
}

/* ITEM */
.item {
  display: flex;
  flex-direction: column;
  text-align: center;
}

/* FIXED IMAGE BOX */
.image-box {
  width: 100%;
  height: 95px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: transparent;
  border: none;
  overflow: visible;
}

.image-box img {
  max-width: 100%;
  max-height: 100%;

  width: auto;
  height: auto;

  object-fit: contain;
  display: block;

  /* premium subtle effect */
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
}

/* TEXT */
.title {
  color: #fff;
  font-size: 12px;
  margin-top: 4px;
}

.desc {
  color: #aaa;
  font-size: 9px;
  line-height: 1.35;
  margin-top: 2px;
}

.price {
  color: #d4af37;
  font-size: 10px;
  margin-top: 3px;
}

/* FOOTER */
.footer {
  flex-shrink: 0;
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid rgba(212,175,55,0.2);
  text-align: center;
}

.social {
  display: inline-flex;
  gap: 18px;
  flex-wrap: wrap;
  justify-content: center;
  color: #bbb;
  font-size: 10px;
}

.social div {
  display: flex;
  align-items: center;
  gap: 5px;
}

/* PRINT */
@media print {
  body {
    margin: 0;
    background: white;
  }

  .page {
    width: 210mm;
    height: 297mm;
  }

  .frame {
    width: 180mm;
    height: 267mm;
    border: 1px solid #d4af37;
  }
}

</style>
</head>
<body>

<div class="page">
  <div class="frame">

    <div class="header">
      <div class="logo">
        <img src="logo.png">
      </div>

      <div class="restaurant-name">OCEAN</div>
      <div class="tagline">Kitchen & Lounge • EST. 2023</div>

      <div class="divider"></div>

      <div class="info">
        Jl. Ahmad Yani No.34 Sragen<br>
        0857-4102-2111 • 0857-1246-9835
      </div>
    </div>

    <div class="menu">

      <div class="item">
        <div class="image-box">
          <img src="hero.png">
        </div>
        <div class="title">Ocean Latte</div>
        <div class="desc">Signature drink</div>
        <div class="price">IDR 32K</div>
      </div>

      <div class="item">
        <div class="image-box">
          <img src="signature.jpg">
        </div>
        <div class="title">Grilled Salmon</div>
        <div class="desc">Fresh ocean fish</div>
        <div class="price">IDR 65K</div>
      </div>

      <div class="item">
        <div class="image-box">
          <img src="nila-goreng.png">
        </div>
        <div class="title">Beef Steak</div>
        <div class="desc">Premium beef</div>
        <div class="price">IDR 75K</div>
      </div>

      <div class="item">
        <div class="image-box">
          <img src="cookies-cream.png">
        </div>
        <div class="title">Matcha Latte</div>
        <div class="desc">Japanese matcha</div>
        <div class="price">IDR 28K</div>
      </div>

    </div>

    <div class="footer">
      <div class="social">
        <div><i class="fab fa-instagram"></i> @ocean.srg</div>
        <div><i class="fab fa-facebook-f"></i> ocean.srg</div>
        <div><i class="fab fa-tiktok"></i> ocean.srg</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
