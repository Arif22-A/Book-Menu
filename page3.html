<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ocean Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Playfair Display', serif;
  background: #0a0a0a;
}

/* FULL SCREEN CENTER */
.page {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FRAME (A4 RATIO) */
.frame {
  width: min(92vw, 420px);
  aspect-ratio: 210 / 297;

  border: 1.5px solid #d4af37;
  padding: 20px;

  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 12px;
}

.logo {
  width: 36px;
  height: 36px;
  border: 1px solid #d4af37;
  border-radius: 50%;
  margin: auto;
}

.restaurant-name {
  color: #d4af37;
  letter-spacing: 3px;
  font-size: 16px;
  margin-top: 6px;
}

.tagline {
  color: #aaa;
  font-size: 10px;
  margin-top: 4px;
}

.divider {
  height: 1px;
  background: rgba(212,175,55,0.4);
  margin: 8px auto;
  width: 60%;
}

.info {
  color: #ccc;
  font-size: 10px;
  line-height: 1.5;
}

/* CONTENT GRID */
.menu {
  flex: 1;

  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;

  gap: 10px;
}

/* portrait (tinggi) */
.item.portrait img {
  height: 120px;
}

/* landscape (lebar) */
.item.landscape img {
  height: 80px;
}

/* ITEM */
.item {
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

/* IMAGE */
.item img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  border-radius: 4px;
}

/* TEXT */
.title {
  color: #fff;
  font-size: 13px;
  margin-top: 5px;
}

.desc {
  color: #aaa;
  font-size: 10px;
  line-height: 1.3;
}

.price {
  color: #d4af37;
  font-size: 11px;
  margin-top: 2px;
}

/* FOOTER */
.footer {
  margin-top: 10px;
}

.social {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: #d4af37;
}

.social div {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* PRINT */
@media print {

  body {
    margin: 0;
  }

  .page {
    width: 210mm;
    height: 297mm;
  }

  .frame {
    width: 180mm;
    height: 267mm;
  }

}

</style>
</head>

<body>

<div class="page">
  <div class="frame">

    <!-- HEADER -->
    <div class="header">
      <div class="logo"></div>
      <div class="restaurant-name">OCEAN</div>
      <div class="tagline">Kitchen & Lounge • EST. 2023</div>
      <div class="divider"></div>
      <div class="info">
        Jl. Ahmad Yani No.34 Sragen<br>
        0857-4102-2111 • 0857-1246-9835
      </div>
    </div>

    <!-- CONTENT -->
   <div class="menu">

  <!-- KIRI ATAS (PORTRAIT) -->
  <div class="item portrait">
    <img src="https://via.placeholder.com/200x300">
    <div class="title">Ocean Latte</div>
    <div class="desc">Signature drink</div>
    <div class="price">IDR 32K</div>
  </div>

  <!-- KANAN ATAS (LANDSCAPE) -->
  <div class="item landscape">
    <img src="https://via.placeholder.com/300x200">
    <div class="title">Grilled Salmon</div>
    <div class="desc">Fresh ocean fish</div>
    <div class="price">IDR 65K</div>
  </div>

  <!-- KIRI BAWAH (LANDSCAPE) -->
  <div class="item landscape">
    <img src="https://via.placeholder.com/300x200">
    <div class="title">Beef Steak</div>
    <div class="desc">Premium beef</div>
    <div class="price">IDR 75K</div>
  </div>

  <!-- KANAN BAWAH (PORTRAIT) -->
  <div class="item portrait">
    <img src="https://via.placeholder.com/200x300">
    <div class="title">Matcha Latte</div>
    <div class="desc">Japanese matcha</div>
    <div class="price">IDR 28K</div>
  </div>

</div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="social">
        <div><i class="fab fa-instagram"></i> @ocean.srg</div>
        <div><i class="fab fa-facebook-f"></i> ocean.srg</div>
        <div><i class="fab fa-tiktok"></i> ocean.srg</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
