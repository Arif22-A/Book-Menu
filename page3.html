<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Menu - Signature</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Playfair Display', serif;
}

/* PAGE */
.page {
  position: relative;
  width: 100%;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* BACKGROUND */
.bg-black {
  position: absolute;
  inset: 0;
  background: #0a0a0a;
  z-index: 0;
}

/* FRAME */
.page-frame {
  position: relative;
  z-index: 1;
  width: 90%;
  max-width: 420px;
  aspect-ratio: 210 / 297;
  border: 1.5px solid #d4af37;
  display: flex;
  justify-content: center;
  align-items: center;
}

.page-frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212,175,55,0.5);
}

/* CONTENT */
.page-content {
  width: 75%;
  text-align: center;
  color: #eaeaea;
}

/* IMAGE */
.signature-img {
  margin-bottom: 25px;
}

.signature-img img {
  width: 100%;
  height: 180px; /* 🔥 lebih tinggi */
  object-fit: cover;
  object-position: center;
  border-radius: 6px;
  filter: brightness(0.8);
}

/* LABEL */
.label {
  font-size: 10px;
  letter-spacing: 3px;
  color: #d4af37;
  margin-bottom: 10px;
}

/* TITLE */
.title {
  font-size: 20px;
  margin-bottom: 10px;
}

/* DESC */
.desc {
  font-size: 12px;
  color: #aaa;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* PRICE */
.price {
  font-size: 14px;
  color: #d4af37;
  letter-spacing: 1px;
}

/* PRINT */
@page {
  size: A4;
  margin: 0;
}

@media print {

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  html, body {
    width: 210mm;
    height: 297mm;
  }

  .page {
    width: 210mm;
    height: 297mm;
    position: relative;
    display: block;
  }

  .page-frame {
    position: absolute;
    width: 180mm;
    height: 267mm;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
}
.signature-img {
  background: #000;
  padding: 10px;
  border-radius: 6px;
}

.signature-img img {
  width: 100%;
  height: 140px;
  object-fit: contain;
}
</style>
</head>

<body>

<div class="page">

  <div class="bg-black"></div>

  <div class="page-frame">
    <div class="page-content">

      <div class="signature-img">
        <img src="signature.jpg">
      </div>

      <div class="label">SIGNATURE</div>

      <div class="title">Ocean Special Latte</div>

      <div class="desc">
        A smooth blend of premium coffee with creamy texture,
        crafted to deliver a rich and unforgettable taste.
      </div>

      <div class="price">IDR 32K</div>

       <div class="signature-img">
        <img src="signature.jpg">
      </div>

      <div class="label">SIGNATURE</div>

      <div class="title">Ocean Special Latte</div>

      <div class="desc">
        A smooth blend of premium coffee with creamy texture,
        crafted to deliver a rich and unforgettable taste.
      </div>

      <div class="price">IDR 32K</div>

    </div>
  </div>

</div>
</div>
<div class="nav-arrow prev">
  <a href="page2.html">
    <i class="fas fa-arrow-left"></i>
  </a>
</div>
</body>
</html>
