<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Menu - Opening</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Playfair Display', serif;
}

/* COVER BASE (SAMA DENGAN COVER 1) */
.page {
  position: relative;
  width: 100%;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* BACKGROUND HITAM (ANTI PRINT BUG) */
.bg-black {
  position: absolute;
  inset: 0;
  background: #0a0a0a;
  z-index: 0;
}

/* FRAME */
.page-frame {
  position: relative;
  z-index: 1;
  width: 90%;
  max-width: 420px;
  aspect-ratio: 210 / 297;
  border: 1.5px solid #d4af37;
  display: flex;
  justify-content: center;
  align-items: center;
}

.page-frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212,175,55,0.5);
}

/* CONTENT */
.page-content {
  text-align: center;
  width: 70%;
  color: #eaeaea;
}

/* QUOTE */
.quote {
  font-size: 16px;
  line-height: 1.6;
  font-style: italic;
  margin-bottom: 25px;
}

/* AUTHOR */
.author {
  font-size: 11px;
  letter-spacing: 2px;
  color: #d4af37;
}

/* ================= PRINT ================= */
@page {
  size: A4;
  margin: 0;
}

@media print {

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  html, body {
    width: 210mm;
    height: 297mm;
  }

  .page {
    width: 210mm;
    height: 297mm;
  }

  .page-frame {
    position: absolute;
    width: 180mm;
    height: 267mm;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
}

</style>
</head>

<body>

<div class="page">

  <div class="bg-black"></div>

  <div class="page-frame">
    <div class="page-content">
      
      <div class="quote">
        “A great dining experience is not just about food,<br>
        but about memory.”
      </div>

      <div class="author">
        — OCEAN KITCHEN
      </div>

    </div>
  </div>

</div>

</body>
</html>
