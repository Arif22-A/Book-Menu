<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Menu - Opening</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Playfair Display', serif;
}

/* COVER BASE (SAMA DENGAN COVER 1) */
.page {
  position: relative;
  width: 100%;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* BACKGROUND HITAM (ANTI PRINT BUG) */
.bg-black {
  position: absolute;
  inset: 0;
  background: #0a0a0a;
  z-index: 0;
}

/* FRAME */
.page-frame {
  position: relative;
  z-index: 1;
  width: 90%;
  max-width: 420px;
  aspect-ratio: 210 / 297;
  border: 1.5px solid #d4af37;
  display: flex;
  justify-content: center;
  align-items: center;
}

.page-frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212,175,55,0.5);
}

/* CONTENT */
.page-content {
  text-align: center;
  width: 70%;
  color: #eaeaea;
}

/* QUOTE */
.quote {
  font-size: 16px;
  line-height: 1.6;
  font-style: italic;
  margin-bottom: 25px;
}

/* AUTHOR */
.author {
  font-size: 11px;
  letter-spacing: 2px;
  color: #d4af37;
}

/* ================= PRINT ================= */
@page {
  size: A4;
  margin: 0;
}

@media print {

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  html, body {
    width: 210mm;
    height: 297mm;
    overflow: hidden;
  }

  .page {
    width: 210mm;
    height: 297mm;
    position: relative;
    display: block; /* 🔥 jangan flex saat print */
  }

  .bg-black {
    position: absolute;
    inset: 0;
  }

  .page-frame {
    position: absolute;
    width: 180mm;
    height: 267mm;

    /* 🔥 CENTER FIX */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* 🔥 PENTING BANGET */
  .page, .page-frame {
    page-break-after: avoid;
    page-break-inside: avoid;
  }
}
  
/* NAVIGATION ARROWS */
.nav-arrow {
  position: fixed;
  bottom: 20px;
  z-index: 999;
}

.nav-arrow a {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: 1px solid #d4af37;
  border-radius: 50%;
  color: #d4af37;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

/* HOVER */
.nav-arrow a:hover {
  background: #d4af37;
  color: #000;
}

/* POSISI */
.nav-arrow.next {
  right: 20px;
}

.nav-arrow.prev {
  left: 20px;
}

/* HILANG SAAT PRINT */
@media print {
  .nav-arrow {
    display: none !important;
  }
}
.logo img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 1px solid #d4af37;
  margin-bottom: 25px;
  opacity: 0.9;
}

.quote {
  font-size: 15px;
  line-height: 1.8;
}
</style>
</head>

<body>

<div class="page">

  <div class="bg-black"></div>

  <div class="page-frame">
   <div class="page-content">

  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="quote">
    “A great dining experience is not just about food,<br>
    but about memory.”
  </div>

  <div class="author">
    — OCEAN KITCHEN
  </div>

</div>
</div>

</div>
<div class="nav-arrow prev">
  <a href="index.html">
    <i class="fas fa-arrow-left"></i>
  </a>
</div>

<div class="nav-arrow next">
  <a href="menu.html">
    <i class="fas fa-arrow-right"></i>
  </a>
</div>
</body>
</html>
