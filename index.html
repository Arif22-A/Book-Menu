<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
<style>
/* RESET */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: #0a0a0a;
  font-family: 'Playfair Display', serif;
  color: #eaeaea;
}

/* =========================
   COVER LAYOUT
========================= */
.cover {
  width: 100%;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FRAME */
.cover-frame {
  width: 90%;
  max-width: 420px;
  aspect-ratio: 210 / 297;
  border: 1.5px solid #d4af37;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* DOUBLE BORDER */
.cover-frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212,175,55,0.5);
}

/* =========================
   CONTENT
========================= */
.cover-content {
  text-align: center;
  width: 70%;
}

/* LOGO */
.logo img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 50%;
  border: 1px solid #d4af37;
  margin-bottom: 20px;
}

/* NAMA RESTO */
.restaurant-name {
  font-size: 30px;
  letter-spacing: 4px;
  color: #d4af37;
  margin-bottom: 10px;
}

/* TAGLINE */
.tagline {
  font-size: 11px;
  color: #aaa;
  letter-spacing: 2px;
}

/* GARIS */
.divider {
  width: 50px;
  height: 1px;
  background: #d4af37;
  margin: 20px auto 0;
}

/* =========================
   MOBILE FIX
========================= */
@media (max-width: 600px) {
  .cover-frame {
    width: 92%;
  }

  .cover-content {
    width: 80%;
  }
}

/* =========================
   PRINT MODE
========================= */
@media print {

  html, body {
    overflow: hidden;
    background: transparent;
  }

  .cover {
    width: 210mm;
    height: 297mm;
  }

  .cover-frame {
    width: 180mm;
    height: 267mm;
  }
}
</style>
</head>
<body>

<div class="cover">
  <div class="cover-frame">

    <div class="cover-content">
      
      <div class="logo">
        <img src="logo.png">
      </div>

      <div class="restaurant-name">OCEAN</div>
      <div class="tagline">Kitchen & Lounge • EST. 2023</div>

      <div class="divider"></div>

    </div>

  </div>
</div>

</body>
</html>
