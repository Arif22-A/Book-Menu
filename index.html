<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  font-family: 'Playfair Display', serif;
}

/* =========================
   COVER
========================= */
.cover {
  position: relative;
  width: 100%;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🔥 BACKGROUND REAL (ANTI PUTIH PRINT) */
.bg-black {
  position: absolute;
  inset: 0;
  background: #0a0a0a;
  z-index: 0;
}

/* FRAME */
.cover-frame {
  position: relative;
  z-index: 1;
  width: 90%;
  max-width: 420px;
  aspect-ratio: 210 / 297;
  border: 1.5px solid #d4af37;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* DOUBLE BORDER */
.cover-frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212,175,55,0.5);
}

/* CONTENT */
.cover-content {
  text-align: center;
  width: 70%;
}

/* LOGO */
.logo img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 1px solid #d4af37;
  margin-bottom: 20px;
}

/* TEXT */
.restaurant-name {
  font-size: 30px;
  letter-spacing: 4px;
  color: #d4af37;
  margin-bottom: 10px;
}

.tagline {
  font-size: 11px;
  color: #aaa;
  letter-spacing: 2px;
}

.divider {
  width: 50px;
  height: 1px;
  background: #d4af37;
  margin: 20px auto 0;
}

/* =========================
   PRINT FIX (INI KUNCI)
========================= */
@page {
  size: A4;
  margin: 0;
}

@media print {

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  html, body {
    width: 210mm;
    height: 297mm;
  }

  .cover {
    width: 210mm;
    height: 297mm;
    position: relative;
  }

  .bg-black {
    background: #0a0a0a !important;
  }

  /* CENTER FIX */
  .cover-frame {
    position: absolute;
    width: 180mm;
    height: 267mm;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
}
/* NAVIGATION ARROWS */
.nav-arrow {
  position: fixed;
  bottom: 20px;
  z-index: 999;
}

.nav-arrow a {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: 1px solid #d4af37;
  border-radius: 50%;
  color: #d4af37;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

/* HOVER */
.nav-arrow a:hover {
  background: #d4af37;
  color: #000;
}

/* POSISI */
.nav-arrow.next {
  right: 20px;
}

.nav-arrow.prev {
  left: 20px;
}

/* HILANG SAAT PRINT */
@media print {
  .nav-arrow {
    display: none !important;
  }
}
</style>
</head>

<body>

<div class="cover">

  <!-- 🔥 BACKGROUND FIX -->
  <div class="bg-black"></div>

  <div class="cover-frame">
    <div class="cover-content">
      
      <div class="logo">
        <img src="logo.png">
      </div>

      <div class="restaurant-name">OCEAN</div>
      <div class="tagline">Kitchen & Lounge • EST. 2023</div>

      <div class="divider"></div>

    </div>
  </div>

</div>
<div class="nav-arrow next">
  <a href="page2.html">
    <i class="fas fa-arrow-right"></i>
  </a>
</div>
</body>
</html>
