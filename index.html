<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
<style>
/* RESET DASAR */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden; /* 🔥 hilangin scroll samping */
  background: #0a0a0a;
}

/* =========================
   SCREEN (HP & DESKTOP)
========================= */
.cover {
  width: 100%;
  height: 100dvh; /* 🔥 fix tinggi HP */
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FRAME A4 RESPONSIVE */
.cover-frame {
  width: 90%;
  max-width: 420px;
  aspect-ratio: 210 / 297; /* 🔥 kunci proporsi A4 */
  border: 1.5px solid #d4af37;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* DOUBLE BORDER (OPSIONAL) */
.cover-frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212,175,55,0.5);
}

/* =========================
   MOBILE FIX
========================= */
@media (max-width: 600px) {
  .cover {
    height: 100dvh;
  }

  .cover-frame {
    width: 92%;
  }
}

/* =========================
   PRINT (A4 PRESISI)
========================= */
@media print {

  html, body {
    overflow: hidden;
  }

  .cover {
    width: 210mm;
    height: 297mm;
    padding: 0;
  }

  .cover-frame {
    width: 180mm;
    height: 267mm;
  }
}
</style>
</head>

<body>

<div class="cover">

  <div class="cover-frame">

    <div class="cover-content">
      
      <div class="logo">
        <img src="logo.png">
      </div>

      <div class="restaurant-name">OCEAN</div>
      <div class="tagline">Kitchen & Lounge • EST. 2023</div>

      <div class="divider"></div>

    </div>

  </div>

</div>

</div>
</body>
</html>
